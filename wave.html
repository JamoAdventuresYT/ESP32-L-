<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Mode GD</title>
<style>
body {
  margin: 0;
  background: #0f172a;
  overflow: hidden;
  font-family: Arial, sans-serif;
  user-select: none;
}
canvas {
  display: block;
}
h1 {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}
</style>
</head>
<body>
<h1>Wave Mode</h1>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let wave = { x: 100, y: canvas.height/2, size: 20, direction: 1, speed: 6 };
let obstacles = [];
let frame = 0;
let score = 0;
let holding = false;

// Create obstacles
function createObstacle() {
  const gap = 200;
  const height = Math.random() * (canvas.height - gap - 100) + 50;
  obstacles.push({x: canvas.width, y: 0, width: 30, height: height});
  obstacles.push({x: canvas.width, y: height + gap, width: 30, height: canvas.height - height - gap});
}

// Draw the wave
function drawWave() {
  ctx.fillStyle = '#22c55e';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(wave.x, wave.y, wave.size, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
}

// Draw obstacles
function drawObstacles() {
  ctx.fillStyle = '#f87171';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 2;
  obstacles.forEach(ob => {
    ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
    ctx.strokeRect(ob.x, ob.y, ob.width, ob.height);
  });
}

// Check collisions
function checkCollision() {
  for (let ob of obstacles) {
    if (wave.x + wave.size > ob.x && wave.x - wave.size < ob.x + ob.width &&
        wave.y + wave.size > ob.y && wave.y - wave.size < ob.y + ob.height) {
      resetGame();
    }
  }
  if (wave.y - wave.size < 0 || wave.y + wave.size > canvas.height) resetGame();
}

function resetGame() {
  wave.y = canvas.height/2;
  wave.direction = 1;
  obstacles = [];
  score = 0;
  frame = 0;
}

function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Wave mechanics
  wave.y += wave.speed * (holding ? -1 : 1);
  wave.x += 4; // optional horizontal speed for visual motion

  // Obstacles
  if (frame % 90 === 0) createObstacle();
  obstacles.forEach(ob => ob.x -= 6);
  obstacles = obstacles.filter(ob => ob.x + ob.width > 0);

  // Draw
  drawWave();
  drawObstacles();
  checkCollision();

  // Score
  ctx.fillStyle = 'white';
  ctx.font = '20px Segoe UI';
  ctx.fillText('Score: ' + score, 20, 30);

  score++;
  frame++;
  requestAnimationFrame(update);
}

// Input
window.addEventListener('mousedown', () => holding = true);
window.addEventListener('mouseup', () => holding = false);
window.addEventListener('keydown', e => { if (e.key === ' ') holding = true });
window.addEventListener('keyup', e => { if (e.key === ' ') holding = false });

update();
</script>
</body>
</html>
