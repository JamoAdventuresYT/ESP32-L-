<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Mode Full</title>
<style>
body { margin: 0; background: #0f172a; overflow: hidden; font-family: Arial, sans-serif; user-select: none; }
canvas { display: block; }
h1 { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: white; font-family: 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<h1>Wave Mode</h1>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const PLAYER_SIZE = 20;
const PLAYER_X = 100; // fixed horizontal
let player = { x: PLAYER_X, y: canvas.height/2, speedY: 0 };
let gravity = 6; // diagonal movement magnitude
let holding = false;

let obstacles = [];
let frame = 0;
let score = 0;

// Generate a pattern of obstacles
function generateObstacles() {
  const gap = 200; // vertical gap for wave
  const patternLength = 4; // how many obstacles per pattern
  let y = Math.random() * (canvas.height - gap - 50) + 25;
  for (let i = 0; i < patternLength; i++) {
    // top obstacle
    obstacles.push({x: canvas.width + i*150, y: 0, width: 30, height: y});
    // bottom obstacle
    obstacles.push({x: canvas.width + i*150, y: y + gap, width: 30, height: canvas.height - y - gap});
    // filler obstacle (small)
    obstacles.push({x: canvas.width + i*150 + 75, y: y + gap/2 - 20, width: 20, height: 40});
    y = Math.random() * (canvas.height - gap - 50) + 25;
  }
}

// Draw the player
function drawPlayer() {
  ctx.fillStyle = '#22c55e';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(player.x, player.y, PLAYER_SIZE, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
}

// Draw obstacles
function drawObstacles() {
  ctx.fillStyle = '#f87171';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 2;
  obstacles.forEach(ob => {
    ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
    ctx.strokeRect(ob.x, ob.y, ob.width, ob.height);
  });
}

// Collision detection
function checkCollision() {
  for (let ob of obstacles) {
    if (player.x + PLAYER_SIZE > ob.x && player.x - PLAYER_SIZE < ob.x + ob.width &&
        player.y + PLAYER_SIZE > ob.y && player.y - PLAYER_SIZE < ob.y + ob.height) {
      resetGame();
    }
  }
  if (player.y - PLAYER_SIZE < 0 || player.y + PLAYER_SIZE > canvas.height) resetGame();
}

// Reset
function resetGame() {
  player.y = canvas.height/2;
  obstacles = [];
  frame = 0;
  score = 0;
}

// Game update
function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Wave movement
  player.y += holding ? -gravity : gravity;

  // Generate obstacles periodically
  if (frame % 90 === 0) generateObstacles();

  // Move obstacles left
  obstacles.forEach(ob => ob.x -= 6);
  obstacles = obstacles.filter(ob => ob.x + ob.width > 0);

  // Draw everything
  drawPlayer();
  drawObstacles();
  checkCollision();

  // Score
  ctx.fillStyle = 'white';
  ctx.font = '20px Segoe UI';
  ctx.fillText('Score: ' + score, 20, 30);

  score++;
  frame++;
  requestAnimationFrame(update);
}

// Input
window.addEventListener('mousedown', () => holding = true);
window.addEventListener('mouseup', () => holding = false);
window.addEventListener('keydown', e => { if (e.key === ' ') holding = true; });
window.addEventListener('keyup', e => { if (e.key === ' ') holding = false; });

update();
</script>
</body>
</html>
