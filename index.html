<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ESP32 Game Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

h1 {
  text-align: center;
  margin: 25px 0 10px;
  font-size: 2.2em;
  letter-spacing: 1px;
  animation: fadeDown 0.8s ease;
}

button {
  display: inline-block;
  margin: 0 10px 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 15px #22c55e;
}

#games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 18px;
  padding: 20px;
}

.game {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(6px);
  padding: 18px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;

  opacity: 0;
  transform: translateY(20px) scale(0.95);

  transition: transform 0.25s, background 0.25s, box-shadow 0.25s;
}

.game:hover {
  transform: scale(1.08) translateY(-4px);
  background: rgba(255,255,255,0.1);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.game h3 {
  margin: 10px 0 0;
  font-size: 1em;
}

.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  transition: all 0.5s ease;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<h1>🎮 ESP32 Game Hub</h1>
<div style="text-align:center;">
  <button onclick="loadGames()">Load Games</button>
  <button onclick="clearCacheAndReload()">Clear Cache & Reload</button>
</div>

<div id="games"></div>

<script>
async function loadGames() {
  const container = document.getElementById("games");
  container.innerHTML = "Loading...";

  try {
    // Always bypass cache
    const res = await fetch("https://JamoAdventuresYT.github.io/ESP32-L-/games.json?v=" + new Date().getTime(), {cache: "no-store"});
    const games = await res.json();

    container.innerHTML = "";

    games.forEach((game, i) => {
      const div = document.createElement("div");
      div.className = "game";
      div.innerHTML = `<h3>${game.name}</h3>`;
      div.onclick = () => {
        window.open(game.url, "_blank");
      };
      container.appendChild(div);

      setTimeout(() => div.classList.add("show"), i * 100);
    });

  } catch (err) {
    container.innerHTML = "⚠️ Failed to load games. Check your GitHub Pages URL!";
    console.error(err);
  }
}

function clearCacheAndReload() {
  // Clear browser cache for this page
  if ('caches' in window) {
    caches.keys().then(keys => {
      keys.forEach(key => caches.delete(key));
    });
  }
  loadGames();
}

// Automatically load games on first visit
loadGames();
</script>

</body>
</html>
