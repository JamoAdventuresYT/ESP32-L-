<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
  body {
    margin: 0;
    background: #87ceeb; /* sky blue */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    border: 3px solid black; /* black outline for canvas */
    background: #87ceeb; /* sky */
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game variables
let bird = { x: 80, y: 300, width: 30, height: 30, velocity: 0 };
const gravity = 0.6;
const jump = -10;

let pipes = [];
const pipeWidth = 60;
const pipeGap = 150;
let frame = 0;
let score = 0;
let gameOver = false;

// Key input
document.addEventListener("keydown", e => {
  if (e.code === "Space") bird.velocity = jump;
});

function resetGame() {
  bird.y = 300;
  bird.velocity = 0;
  pipes = [];
  frame = 0;
  score = 0;
  gameOver = false;
}

function drawBird() {
  ctx.fillStyle = "#FFD700"; // gold
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;
  ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
  ctx.strokeRect(bird.x, bird.y, bird.width, bird.height);
}

function drawPipe(pipe) {
  ctx.fillStyle = "#228B22"; // forest green
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;
  // top pipe
  ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
  ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.top);
  // bottom pipe
  ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
  ctx.strokeRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
}

function drawScore() {
  ctx.fillStyle = "black";
  ctx.font = "24px Arial";
  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;
  ctx.fillText("Score: " + score, 10, 30);
  ctx.strokeText("Score: " + score, 10, 30);
}

function checkCollision(pipe) {
  // bird hits pipe
  if (bird.x < pipe.x + pipeWidth && bird.x + bird.width > pipe.x) {
    if (bird.y < pipe.top || bird.y + bird.height > pipe.bottomY) {
      return true;
    }
  }
  // hits ground or ceiling
  if (bird.y + bird.height > canvas.height || bird.y < 0) return true;
  return false;
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // bird physics
  bird.velocity += gravity;
  bird.y += bird.velocity;

  drawBird();

  // generate pipes
  if (frame % 90 === 0) {
    const topHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
    pipes.push({ x: canvas.width, top: topHeight, bottomY: topHeight + pipeGap });
  }

  // move pipes
  pipes.forEach((pipe, index) => {
    pipe.x -= 3;
    drawPipe(pipe);

    if (!gameOver && pipe.x + pipeWidth === bird.x) score++;

    if (checkCollision(pipe)) {
      gameOver = true;
    }

    // remove offscreen pipes
    if (pipe.x + pipeWidth < 0) pipes.splice(index, 1);
  });

  drawScore();

  if (!gameOver) {
    frame++;
    requestAnimationFrame(gameLoop);
  } else {
    ctx.fillStyle = "red";
    ctx.font = "40px Arial";
    ctx.strokeStyle = "black";
    ctx.lineWidth = 4;
    ctx.fillText("Game Over", canvas.width/2 - 100, canvas.height/2);
    ctx.strokeText("Game Over", canvas.width/2 - 100, canvas.height/2);
    ctx.font = "20px Arial";
    ctx.fillText("Press Space to Restart", canvas.width/2 - 110, canvas.height/2 + 40);
    ctx.strokeText("Press Space to Restart", canvas.width/2 - 110, canvas.height/2 + 40);
  }
}

// restart on space if game over
document.addEventListener("keydown", e => {
  if (e.code === "Space" && gameOver) {
    resetGame();
    requestAnimationFrame(gameLoop);
  }
});

// start game
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
