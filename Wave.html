<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wave Mode Challenge</title>
<style>
  body { margin:0; overflow:hidden; background:#0f172a; }
  canvas { display:block; margin:0 auto; background:#020617; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', ()=> { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; });

let ship = { x: 100, y: H/2, size: 30, dy:0, speed:0.5 };
let gravity = 0.3;
let jump = -8;

let obstacles = [];
let frame = 0;
let speed = 4;

// generate repeating obstacle patterns
const pattern = [
  { gapY: 200, gapSize: 150 },
  { gapY: 250, gapSize: 120 },
  { gapY: 180, gapSize: 180 },
  { gapY: 220, gapSize: 130 }
];

function spawnObstacle() {
  let p = pattern[frame % pattern.length];
  obstacles.push({ x: W, gapY: p.gapY, gapSize: p.gapSize });
}

function drawShip() {
  ctx.fillStyle = '#22c55e';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.fillRect(ship.x, ship.y, ship.size, ship.size);
  ctx.strokeRect(ship.x, ship.y, ship.size, ship.size);
}

function drawObstacles() {
  ctx.fillStyle = '#facc15';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  obstacles.forEach(obs => {
    // top rect
    ctx.fillRect(obs.x, 0, 50, obs.gapY - obs.gapSize/2);
    ctx.strokeRect(obs.x, 0, 50, obs.gapY - obs.gapSize/2);
    // bottom rect
    ctx.fillRect(obs.x, obs.gapY + obs.gapSize/2, 50, H - (obs.gapY + obs.gapSize/2));
    ctx.strokeRect(obs.x, obs.gapY + obs.gapSize/2, 50, H - (obs.gapY + obs.gapSize/2));
  });
}

function update() {
  ctx.clearRect(0,0,W,H);
  frame++;

  // spawn obstacles every 90 frames
  if(frame % 90 === 0) spawnObstacle();

  // move obstacles
  obstacles.forEach(obs => obs.x -= speed);
  obstacles = obstacles.filter(obs => obs.x + 50 > 0); // remove offscreen

  // ship physics
  ship.dy += gravity;
  ship.y += ship.dy;

  // collision detection
  for(let obs of obstacles){
    if(ship.x + ship.size > obs.x && ship.x < obs.x + 50){
      if(ship.y < obs.gapY - obs.gapSize/2 || ship.y + ship.size > obs.gapY + obs.gapSize/2){
        resetGame();
      }
    }
  }

  // floor & ceiling
  if(ship.y < 0) { ship.y=0; ship.dy=0; }
  if(ship.y + ship.size > H){ ship.y=H-ship.size; ship.dy=0; }

  drawShip();
  drawObstacles();

  requestAnimationFrame(update);
}

function resetGame() {
  ship.y = H/2; ship.dy=0; obstacles=[]; frame=0; speed=4;
}

// controls
window.addEventListener('keydown', e=>{
  if(e.code==='Space' || e.code==='ArrowUp'){ ship.dy=jump; }
});

window.addEventListener('mousedown', ()=>{ ship.dy=jump; });

update();
</script>
</body>
</html>
